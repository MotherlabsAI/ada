pack: "ada-tui-design"
checks:
  - id: "contrast_aa"
    class: "C5"
    invariant: "Every role token used for TEXT (text, textDim, textMuted, accent, focus, success, warning, error) meets WCAG AA contrast on bg #1B1410: ≥4.5:1 for body, ≥3:1 for large/icon use. Pure ratio math on the hex pair — no judgment."
    guards:
      - "PALETTE.022"
  - id: "no_color_no_ansi"
    class: "C4"
    invariant: "With NO_COLOR set (or a non-TTY stream), the rendered surface emits zero ANSI SGR colour escapes (no \\x1b[3#m / \\x1b[38;2;…m). Presence-only styling is allowed; colour is not."
    guards:
      - "PALETTE.023"
      - "STATE.074"
      - "A11Y.081"
  - id: "color_has_glyph"
    class: "C4"
    invariant: "Every state communicated by a colour token is ALSO carried by a non-colour glyph AND label, so meaning survives colour-strip and colour-blindness. Audits the projected StateTokens (source ∵, inferred ∴, residue Ω, check κ, failure ✗, cursor ❯, flagged ⊙, node ◇, blocked ▲) — not a hand-copied table."
    guards:
      - "LAYOUT.034"
      - "A11Y.080"
      - "VOICE.092"
  - id: "state_color_paired"
    class: "C4"
    invariant: "No status-tier colour is status-only: every status role (success/warning/error) is referenced by >=1 StateToken carrying a glyph, and every StateToken points at a known role. A status colour with no glyph-bearing state is rejected. This is Slice-1's 'verifier rejects unknown status-only colours'."
    guards:
      - "A11Y.080"
      - "STATE.074"
  - id: "motion_has_reduced"
    class: "C4"
    invariant: "Every MotionToken declares (a) a reduced-motion alternative from {static, static-glyph, instant, final, none}, (b) a non-empty state reason (no idle/decorative animation), and (c) a calm cadence >=16ms (never strobes). Motion is never the only carrier."
    guards:
      - "A11Y.081"
note: "Subjective design properties (calm, premium, one-focal-point) are NOT here — they route to rubric/human-gate (A3/A4). Only deterministic predicates live in C. All checks audit the live projection of src/tui/ink/tokens.ts (tokens.jsonld), regenerated by scripts/project-tokens.mjs on every build."
