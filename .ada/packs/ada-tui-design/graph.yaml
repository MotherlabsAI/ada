        - "blueprint"
    localContext:
      summary: "tokens.ts splits the namespace: role tokens (bg/text/accent/focus…) skin the CHROME and can re-theme the whole shell from one file; the pigment palette in grammar.ts COLOUR_HEX carries MEANING (truth class, cluster identity, check class). Category and meaning never share a token."
      whyItMatters: "Keeping the two channels separate is what stops a 10-colour graph reading as confetti and lets the shell be re-skinned without touching meaning-colour."
      failureIfMissing: "Roles borrow from the area palette (today slate=body, rose=failure, cyan=link) so restyling the chrome silently changes what colours MEAN."
