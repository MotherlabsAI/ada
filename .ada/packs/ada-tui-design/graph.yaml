    localContext:
      summary: "Cluster identity rotates through a fixed pigment set (plum, terracotta, cyan, sage, amber, green, slate, clay, deep_blue, rose); cap simultaneously-visible at ~7 and REPEAT a hue rather than invent a muddy in-between. Hue answers 'what area'; luminance (dim/normal/bold) answers 'how important'."
      whyItMatters: "Humans rank light/dark reliably but not colours; separating the two channels is what stops a many-cluster graph reading as confetti and degrades cleanly to mono."
      failureIfMissing: "Each new area mints a new near-duplicate hue; at 10 clusters the tree is indistinguishable noise."
