  -
    id: "PALETTE.023"
    label: "Capability-aware degradation ladder"
    glyph: "◇"
    colour: "amber"
    status: "finished"
    depth: "L3"
    truth: "inference"
    role:
      cluster: "PALETTE"
      nodeType: "design_capsule"
      compileTargets:
        - "graph"
        - "wiki"
        - "claude"
        - "blueprint"
    localContext:
      summary: "One codepath owns the fallback truecolor → 256 → 16 → mono. Detect level (supports-color/chalk.level), never hardcode the 16 ANSI indices for brand colours (the base16 remap trap) — use named RGB and let it downsample. tokens.ts already documents a 16-colour fallback per role."
      whyItMatters: "grammar.ts paint() emits raw 24-bit escapes unconditionally, which wash out over SSH/sudo/256-colour; the ladder makes earthy-and-legible survive every terminal."
      failureIfMissing: "Brand colours render wrong or invisible on a 256-colour terminal; the user blames Ada for a 'broken' screen."
    worldLinks:
