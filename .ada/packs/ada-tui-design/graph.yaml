    localContext:
      summary: "60% warm-dark base the eye rests on (bg/surface), 30% mid-earth structure & text, 10% accent that is the ONLY thing that pops or moves (accent/focus/selection). Every role is warm (terracotta family); cool pigments stay for meaning, never chrome."
      whyItMatters: "A fixed ratio is what makes restraint reproducible instead of a vibe — it tells you when you've spent your accent budget."
      failureIfMissing: "Accent leaks past 10% and the 'one warm pop' becomes wallpaper; nothing draws the eye because everything does."
