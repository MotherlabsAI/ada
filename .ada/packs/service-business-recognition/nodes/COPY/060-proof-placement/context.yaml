localContext:
  summary: "Model proof as a layer threaded to objection peaks, not a \"Testimonials\" section. Two operating rules. (1) Objection-MATCHED placement: the single proof beside each primary CTA must rebut the objection firing at that CTA — price hesitation gets a value/cost testimonial; fear of a stranger in the home gets a courteous, on-time-technician one. A few decision-moment, objection-matched proofs beat a wall of generic praise stockpiled in a footer or logo row. (2) For a local business the proof that moves rank, humans, AND agents is the same canonical fact — Google rating/review count, years in business, license/insurance numbers, named local references — so author proof once as structured, reusable claims that simultaneously populate the trust strip near the booking form and feed Review/AggregateRating + LocalBusiness JSON-LD (the path to SERP star eligibility and agent-citable credibility). Decorative quotes do none of this; structured claims do all three. Caveat: self-serving AggregateRating markup is policy-restricted, so star eligibility depends on real, attributable review data existing."
  whyItMatters: "Proof placed at the decision moment is what converts a persuaded-but-cautious local buyer; proof modelled as structured claims is what earns review stars in the SERP and gives agents citable evidence. Misplaced proof (all at the bottom) is psychologically wasted and structurally invisible."
  failureIfMissing: "Testimonials sit on a separate page or footer where they reassure no one at the moment of doubt; reviews aren't structured so no star rating shows in search; agents find no citable evidence of credibility. The business looks unproven exactly where it needed to feel safe."
epistemics:
  claimClass: "context_capsule"
  confidence: "high"
  sourceStatus: "excavated_from_intent"
  assumptions: []
