localContext:
  summary: "For a local service business the H1 is not a slogan, it is a three-part contract: WHAT (the service noun) + WHERE (the geo) + WHO-it's-for or the quantified differentiator. \"Emergency Plumbing in Kelowna — On-Site in 90 Minutes\" is a contract the page can pay off; \"Quality You Can Trust\" is a promise nothing downstream can honour. The non-obvious move: this one string is read by three different machines at once, and most operators optimize for only the first. (1) Google's local relevance matcher needs the service+geo tokens to confirm the page answers \"[service] near me\". (2) An LLM entity extractor (ChatGPT/Perplexity, asked \"who does X in Y\") lifts the H1 near-verbatim as the clean entity+geo citation — abstract value-words give it nothing to quote. (3) The arriving human, three seconds from bouncing, is doing message-match: the H1 has to echo the exact query they typed in the ad or search box, or they conclude they're in the wrong place. The keyword matcher, the entity extractor, and the skeptical human are mutually reinforcing readers — a generic H1 fails all three simultaneously, so bounce and irrelevance compound into lost rank AND lost bookings from the same defect. Practical consequence: one contract per money page (per service-area), with the differentiator quantified (speed, hours, guarantee) rather than asserted — and where no genuine differentiator exists, compete on the tightest service+geo specificity available rather than reaching for an abstraction."
  whyItMatters: "The H1 is the single highest-leverage string on the site: it gates the bounce decision, supplies the strongest on-page relevance signal for local rank, and is the most-quoted span when an LLM summarises 'who provides this service here'. Get it generic and all three downstream systems degrade at once."
  failureIfMissing: "Without a contract H1 the page reads as a generic brochure: Google can't confirm service+location match, LLMs have no clean entity+geo string to cite, and a visitor arriving from a specific query feels the page didn't answer them and leaves. Bounce and irrelevance compound into both lost rank and lost bookings."
